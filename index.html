<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    body { background: #87CEEB; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
    .btn { background: white; color: #87CEEB; border: none; padding: 20px; margin: 10px; border-radius: 25px; width: 80%; font-weight: bold; font-size: 18px; transition: 0.2s; }
    .btn:active { background: #0077be; color: white; transform: scale(0.95); }
</style></head>
<body>
    <h1>Анжела</h1>
    <button class="btn" onclick="send('guide')">🤖 Режим Гида</button>
    <button class="btn" onclick="send('translator')">🌐 Переводчик</button>
    <button class="btn" onclick="loc()">📍 Моя локация</button>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        function send(a) { tg.sendData(JSON.stringify({action: a})); }
        function loc() { navigator.geolocation.getCurrentPosition(p => { tg.sendData(JSON.stringify({location: {lat: p.coords.latitude, lon: p.coords.longitude}})); }); }
    </script>
</body></html>
